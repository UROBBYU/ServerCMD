<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{code}} | {{desc}}</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700&display=swap');
        body {
            margin: 0;
            overflow: hidden;
            background-color: #222231;
            filter: blur(0.4px);
        }
        div {
            font-size: {{font}}vmin;
            font-family: 'M PLUS Rounded 1c', sans-serif;
            width: {{width}}vmin;
            text-align: center;
            margin: 50vh 50vw;
			transform: translate(-50%, -50%);
            color: #fff;
            text-shadow: 5px 4px 3px #000;
        }
        span {
            color: {{color}};
        }
    </style>
</head>
<body>
    <div><span>{{code}}</span> | {{desc}}</div>
</body>
</html>
